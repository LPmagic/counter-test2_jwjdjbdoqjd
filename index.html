<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <title>Count</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1c1c1c; --border: #2a2a2a;
      --accent: #c8f04a; --text: #f0f0f0; --muted: #555;
      --warn: #f0c84a; --danger: #ff5f5f;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      display: flex; flex-direction: column; overflow: hidden;
    }

    header {
      padding: 16px 20px 10px; border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; gap: 10px; flex-shrink: 0;
    }
    header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .live-badge { font-size: 10px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
    .live-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .stats-bar { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .stat { flex: 1; padding: 10px 8px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .stat:last-child { border-right: none; }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; font-variant-numeric: tabular-nums; transition: transform 0.1s ease, color 0.2s; }
    .stat-value.bump { transform: scale(1.12); }
    .stat-value.warn { color: var(--warn) !important; }
    .stat-value.danger { color: var(--danger) !important; }
    .stat-label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

    .split-bar { border-bottom: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .split-label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .split-value { font-size: 22px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; transition: color 0.2s; }
    .split-value.warn { color: var(--warn) !important; }
    .split-value.danger { color: var(--danger) !important; }

    .editor-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    textarea {
      flex: 1; width: 100%; background: transparent; border: none; outline: none;
      resize: none; color: var(--text); font-family: inherit; font-size: 16px;
      line-height: 1.65; padding: 16px 20px 80px; caret-color: var(--accent);
    }
    textarea::placeholder { color: var(--muted); }

    /* Floating pill buttons — centered, above keyboard */
    .toolbar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 8px 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      z-index: 10;
    }
    button {
      border: none; border-radius: 40px; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 600;
      letter-spacing: 0.04em; transition: opacity 0.15s, transform 0.1s;
      padding: 13px 22px; white-space: nowrap;
    }
    button:active { transform: scale(0.95); }
    .btn-paste { background: var(--accent); color: #0f0f0f; }
    .btn-paste:hover { opacity: 0.88; }
    .btn-clear { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 13px 16px; }
    .btn-clear:hover { color: var(--danger); }

    .toast {
      position: fixed; top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; padding: 10px 18px;
      border-radius: 8px; opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; white-space: nowrap; z-index: 99;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<header>
  <h1>Count</h1>
  <span class="live-badge">live</span>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-value" id="charCount">0</span><span class="stat-label">Chars</span></div>
  <div class="stat"><span class="stat-value" id="weightedCount">0</span><span class="stat-label">Weighted</span></div>
  <div class="stat"><span class="stat-value" id="wordCount">0</span><span class="stat-label">Words</span></div>
  <div class="stat"><span class="stat-value" id="lineCount">0</span><span class="stat-label">Lines</span></div>
</div>

<div class="split-bar">
  <span class="split-label">Split</span>
  <span class="split-value" id="splitValue">0—0</span>
</div>

<div class="editor-wrap">
  <textarea id="editor" placeholder="Start typing, or paste from clipboard…" spellcheck="true" autocorrect="on"></textarea>
</div>

<div class="toolbar">
  <button class="btn-paste" id="pasteBtn">⎘ Paste</button>
  <button class="btn-clear" id="clearBtn">✕</button>
</div>

<div class="toast" id="toast"></div>

<script>
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'count-v3';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./'])));
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))));
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        }).catch(() => caches.match('./'))));
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: './' }).catch(() => {});
  }

  const editor      = document.getElementById('editor');
  const charCountEl = document.getElementById('charCount');
  const weightedEl  = document.getElementById('weightedCount');
  const wordCountEl = document.getElementById('wordCount');
  const lineCountEl = document.getElementById('lineCount');
  const splitEl     = document.getElementById('splitValue');
  const pasteBtn    = document.getElementById('pasteBtn');
  const clearBtn    = document.getElementById('clearBtn');
  const toast       = document.getElementById('toast');
  let toastTimer;

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function bump(el) {
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 150);
  }

  function setColor(el, val) {
    el.classList.remove('warn', 'danger');
    if (val > 64) el.classList.add('danger');
    else if (val > 62) el.classList.add('warn');
  }

  function weightedCount(text) {
    let w = 0;
    for (const ch of text) w += ch.codePointAt(0) > 127 ? 3 : 1;
    return w;
  }

  function updateCounts() {
    const text  = editor.value;
    const chars = text.length;
    const w     = weightedCount(text);
    const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
    const lines = text === '' ? 0 : text.split('\n').length;
    const s1    = w + 6;
    const s2    = w + 8;

    if (charCountEl.textContent !== String(chars)) { charCountEl.textContent = chars; bump(charCountEl); }
    if (weightedEl.textContent  !== String(w))     { weightedEl.textContent  = w;     bump(weightedEl); }
    wordCountEl.textContent = words;
    lineCountEl.textContent = lines;
    splitEl.textContent = `${s1}—${s2}`;

    setColor(charCountEl, chars);
    setColor(weightedEl, w);

    splitEl.classList.remove('warn', 'danger');
    if (s1 > 64 && s2 > 64) splitEl.classList.add('danger');
    else if (s1 > 62 || s2 > 62) splitEl.classList.add('warn');
  }

  editor.addEventListener('input', updateCounts);

  pasteBtn.addEventListener('click', async () => {
    try {
      const text  = await navigator.clipboard.readText();
      const start = editor.selectionStart;
      const end   = editor.selectionEnd;
      editor.value = editor.value.slice(0, start) + text + editor.value.slice(end);
      editor.selectionStart = editor.selectionEnd = start + text.length;
      editor.focus();
      updateCounts();
      showToast(`Pasted ${text.length} chars`);
    } catch (e) {
      showToast('Tap & hold in the text box → Paste');
    }
  });

  clearBtn.addEventListener('click', () => {
    if (!editor.value) return;
    editor.value = '';
    updateCounts();
    editor.focus();
    showToast('Cleared');
  });
</script>
</body>
</html>
